<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Strength Analyzer</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>

  <style>
    /* ── CSS Variables ─────────────────────────────── */
    :root {
      --bg:        #0d0f14;
      --surface:   #161920;
      --border:    #2a2e3a;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --accent:    #f0f0ff;

      --weak:      #ef4444;
      --fair:      #f97316;
      --good:      #eab308;
      --strong:    #22c55e;
      --bar-bg:    #1e2230;
    }

    /* ── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Card ──────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }

    /* ── Header ────────────────────────────────────── */
    .header { text-align: center; margin-bottom: 40px; }

    .icon {
      font-size: 40px;
      display: block;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    p.subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 6px;
    }

    /* ── Input Group ───────────────────────────────── */
    .input-group {
      position: relative;
      margin-bottom: 28px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      padding: 14px 50px 14px 16px;
      outline: none;
      transition: border-color 0.25s;
    }

    input:focus { border-color: #4b5563; }

    /* Toggle eye button */
    .toggle-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--muted);
      transition: color 0.2s;
    }
    .toggle-btn:hover { color: var(--text); }

    /* ── Strength Bar ──────────────────────────────── */
    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    #strength-text { font-weight: 700; font-size: 0.85rem; transition: color 0.3s; }

    .bar-track {
      background: var(--bar-bg);
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 28px;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      width: 0%;
      transition: width 0.45s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s;
    }

    /* ── Checklist ─────────────────────────────────── */
    .checklist {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 32px;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--muted);
      transition: color 0.3s;
    }

    .check-item.passed { color: var(--text); }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      transition: background 0.3s, transform 0.3s;
    }

    .check-item.passed .dot {
      background: var(--strong);
      transform: scale(1.3);
    }

    /* ── Score Badge ───────────────────────────────── */
    .score-badge {
      text-align: center;
      background: var(--bar-bg);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 28px;
    }

    .score-number {
      font-family: 'Space Mono', monospace;
      font-size: 3rem;
      font-weight: 700;
      line-height: 1;
      transition: color 0.3s;
    }

    .score-label {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Tip Box ───────────────────────────────────── */
    .tip-box {
      background: var(--bar-bg);
      border-left: 3px solid var(--border);
      border-radius: 0 10px 10px 0;
      padding: 14px 16px;
      font-size: 0.82rem;
      color: var(--muted);
      min-height: 46px;
      transition: border-color 0.3s, color 0.3s;
    }

    #tip-text { transition: opacity 0.2s; }

    /* ── Copy Button ───────────────────────────────── */
    .copy-btn {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: var(--text);
      color: var(--bg);
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .copy-btn:hover  { opacity: 0.88; transform: translateY(-1px); }
    .copy-btn:active { transform: translateY(0); }

    /* ── Footer ────────────────────────────────────── */
    .footer {
      margin-top: 24px;
      font-size: 0.75rem;
      color: #2e3340;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="card">

  <!-- Header -->
  <div class="header">
    <span class="icon">🔐</span>
    <h1>Password Analyzer</h1>
    <p class="subtitle">Check how strong your password really is</p>
  </div>

  <!-- Input -->
  <div class="input-group">
    <input type="password" id="pwd-input" placeholder="Type your password..." autocomplete="off" />
    <button class="toggle-btn" id="toggle-btn" title="Show/Hide password">👁</button>
  </div>

  <!-- Strength Bar -->
  <div class="bar-label">
    <span>Strength</span>
    <span id="strength-text">—</span>
  </div>
  <div class="bar-track">
    <div class="bar-fill" id="bar-fill"></div>
  </div>

  <!-- Score Badge -->
  <div class="score-badge">
    <div class="score-number" id="score-number">0</div>
    <div class="score-label">/ 100 score</div>
  </div>

  <!-- Checklist -->
  <div class="checklist">
    <div class="check-item" id="chk-length">
      <div class="dot"></div> 8+ characters
    </div>
    <div class="check-item" id="chk-upper">
      <div class="dot"></div> Uppercase (A–Z)
    </div>
    <div class="check-item" id="chk-lower">
      <div class="dot"></div> Lowercase (a–z)
    </div>
    <div class="check-item" id="chk-number">
      <div class="dot"></div> Number (0–9)
    </div>
    <div class="check-item" id="chk-special">
      <div class="dot"></div> Special (!@#...)
    </div>
    <div class="check-item" id="chk-long">
      <div class="dot"></div> 12+ characters
    </div>
  </div>

  <!-- Tip -->
  <div class="tip-box">
    💡 <span id="tip-text">Start typing to see real-time feedback.</span>
  </div>

  <!-- Copy Button -->
  <button class="copy-btn" id="copy-btn">Copy Password</button>

</div>

<div class="footer">Built with HTML · CSS · JavaScript &nbsp;|&nbsp; No data is stored or sent</div>

<!-- ── JavaScript ──────────────────────────────────────────── -->
<script>
  // ── Grab all the elements we need ──────────────────────────
  const input      = document.getElementById('pwd-input');
  const toggleBtn  = document.getElementById('toggle-btn');
  const barFill    = document.getElementById('bar-fill');
  const strengthTx = document.getElementById('strength-text');
  const scoreNum   = document.getElementById('score-number');
  const tipText    = document.getElementById('tip-text');
  const copyBtn    = document.getElementById('copy-btn');

  // Checklist item IDs mapped to their check function
  const checks = [
    { id: 'chk-length',  test: p => p.length >= 8 },
    { id: 'chk-upper',   test: p => /[A-Z]/.test(p) },
    { id: 'chk-lower',   test: p => /[a-z]/.test(p) },
    { id: 'chk-number',  test: p => /[0-9]/.test(p) },
    { id: 'chk-special', test: p => /[^a-zA-Z0-9]/.test(p) },
    { id: 'chk-long',    test: p => p.length >= 12 },
  ];

  // Tips shown based on what's missing
  const tips = [
    { test: p => p.length === 0,              msg: 'Start typing to see real-time feedback.' },
    { test: p => p.length < 8,               msg: 'Too short — aim for at least 8 characters.' },
    { test: p => !/[A-Z]/.test(p),           msg: 'Add an uppercase letter (A–Z) to boost strength.' },
    { test: p => !/[a-z]/.test(p),           msg: 'Mix in some lowercase letters.' },
    { test: p => !/[0-9]/.test(p),           msg: 'Include at least one number (0–9).' },
    { test: p => !/[^a-zA-Z0-9]/.test(p),   msg: 'Add a special character like !, @, or #.' },
    { test: p => p.length < 12,              msg: 'Almost there — try going over 12 characters.' },
    { test: () => true,                       msg: 'Great password! Hard to crack. 🎉' },
  ];

  // Strength levels: [label, color, min-score]
  const levels = [
    { label: 'Weak',   color: '#ef4444', min: 0  },
    { label: 'Fair',   color: '#f97316', min: 30 },
    { label: 'Good',   color: '#eab308', min: 55 },
    { label: 'Strong', color: '#22c55e', min: 80 },
  ];

  // ── Core scoring function ───────────────────────────────────
  function getScore(pwd) {
    if (pwd.length === 0) return 0;

    let score = 0;

    // Length points (max 30)
    score += Math.min(pwd.length * 2.5, 30);

    // Rule bonuses (15 points each, max 60 for all 4)
    if (/[A-Z]/.test(pwd))        score += 15;
    if (/[a-z]/.test(pwd))        score += 15;
    if (/[0-9]/.test(pwd))        score += 15;
    if (/[^a-zA-Z0-9]/.test(pwd)) score += 15;

    // Bonus: 12+ characters
    if (pwd.length >= 12) score += 10;

    // Penalty: all same character e.g. "aaaaaaa"
    if (/^(.)\1+$/.test(pwd)) score = Math.min(score, 10);

    // Cap at 100
    return Math.min(Math.round(score), 100);
  }

  // ── Main analyze function ───────────────────────────────────
  function analyze() {
    const pwd   = input.value;
    const score = getScore(pwd);

    // 1. Update score badge
    scoreNum.textContent = score;

    // 2. Determine level
    let level = levels[0];
    for (const l of levels) {
      if (score >= l.min) level = l;
    }

    // 3. Update bar
    barFill.style.width      = score + '%';
    barFill.style.background = level.color;

    // 4. Update strength label
    strengthTx.textContent = pwd.length ? level.label : '—';
    strengthTx.style.color = pwd.length ? level.color : 'var(--muted)';

    // 5. Update score badge color
    scoreNum.style.color = pwd.length ? level.color : 'var(--text)';

    // 6. Update checklist dots
    for (const chk of checks) {
      const el     = document.getElementById(chk.id);
      const passed = chk.test(pwd);
      el.classList.toggle('passed', passed);
    }

    // 7. Find first failing tip
    const tip = tips.find(t => t.test(pwd));
    tipText.textContent = tip ? tip.msg : '';
  }

  // ── Show/hide password toggle ───────────────────────────────
  toggleBtn.addEventListener('click', () => {
    const isHidden = input.type === 'password';
    input.type       = isHidden ? 'text' : 'password';
    toggleBtn.textContent = isHidden ? '🙈' : '👁';
  });

  // ── Copy password to clipboard ──────────────────────────────
  copyBtn.addEventListener('click', () => {
    if (!input.value) return;

    navigator.clipboard.writeText(input.value).then(() => {
      copyBtn.textContent = '✅ Copied!';
      setTimeout(() => copyBtn.textContent = 'Copy Password', 1800);
    });
  });

  // ── Run analyze on every keystroke ─────────────────────────
  input.addEventListener('input', analyze);

  // Run once on load to set defaults
  analyze();
</script>

</body>
</html>
